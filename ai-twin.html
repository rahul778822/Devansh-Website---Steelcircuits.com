* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  background: radial-gradient(circle at 15% 20%, #060b1a, #020508);
  color: #e2eeff;
  font-family: 'Inter', sans-serif;

::-webkit-scrollbar { width: 8px; }

/* ─────────────────── HEADER ─────────────────── */
.site-header {
  background: rgba(2, 5, 16, 0.92);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(168, 85, 247, 0.2);
  padding: 0.85rem 2rem;
  position: sticky; top: 0; z-index: 100;
  transition: background 0.3s, box-shadow 0.3s;
}
.site-header.scrolled { box-shadow: 0 4px 30px rgba(0,0,0,0.5); }
.nav-container {
  max-width: 1400px; margin: 0 auto;
  display: flex; flex-wrap: wrap;
  justify-content: space-between; align-items: center; gap: 1rem;
}
.site-brand {
  font-family: 'Orbitron', monospace;
  font-size: 0.85rem;
  font-weight: 700;
  letter-spacing: 3px;
  text-decoration: none;
  background: linear-gradient(90deg, #00f5ff, #a855f7);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  transition: 0.22s;
  flex-shrink: 0;
}
.site-brand:hover {
  filter: brightness(1.3);
  text-shadow: 0 0 14px rgba(0,245,255,0.5);
}
.nav-links { display: flex; gap: 1.8rem; flex-wrap: wrap; }
.nav-link {
  color: #b0ccee; text-decoration: none;
  font-weight: 600; font-size: 0.78rem;
  font-family: 'Orbitron', monospace; letter-spacing: 1px;
  transition: 0.22s; padding: 0.4rem 0;
  border-bottom: 2px solid transparent;
  display: flex; align-items: center; gap: 6px;
}
.nav-link:hover, .nav-link.active {
  color: #00f5ff; border-bottom-color: #00f5ff; text-shadow: 0 0 8px #00f5ff;
}
.hamburger {
  display: none; flex-direction: column; gap: 5px;
  background: none; border: 1px solid rgba(168,85,247,0.4);
  padding: 0.5rem; border-radius: 0.5rem; cursor: pointer;
  transition: 0.2s;
}
.hamburger span {
  display: block; width: 22px; height: 2px;
  background: #a855f7; border-radius: 2px; transition: 0.3s;
}
.hamburger:hover { border-color: #00f5ff; box-shadow: 0 0 10px rgba(0,245,255,0.2); transform: none; }
.hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
.hamburger.open span:nth-child(2) { opacity: 0; }
.hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
@media (max-width: 760px) {
  .hamburger { display: flex; }
  .nav-links {
    display: none; position: absolute; top: 100%; left: 0; right: 0;
    flex-direction: column; gap: 0; padding: 1rem;
    background: rgba(2,5,16,0.97); backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(168,85,247,0.2);
  }
  .nav-links.open { display: flex; }
  .nav-link { padding: 0.8rem 0.5rem; border-bottom: 1px solid rgba(168,85,247,0.1); }
}

/* ─────────────────── AI TWIN HERO ─────────────────── */
.ai-twin-hero {
  text-align: center;
  padding: 4rem 2rem 2rem;
}
.ai-twin-hero .twin-badge {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: rgba(168,85,247,0.1);
  border: 1px solid rgba(168,85,247,0.25);
  border-radius: 3rem;
  padding: 0.4rem 1.2rem 0.4rem 0.8rem;
  margin-bottom: 1.5rem;
  font-size: 0.7rem;

  letter-spacing: 2px;

}
.ai-twin-hero .twin-icon-badge {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: linear-gradient(135deg, #7c3aed, #00f5ff);
  display: flex;
  align-items: center;
  justify-content: center;
}
.ai-twin-hero .twin-icon-badge svg {
  width: 18px; height: 18px;
  fill: #fff;
}
.ai-twin-hero h1 {

  font-size: 2.4rem;
  font-weight: 800;
  letter-spacing: 3px;

  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  margin-bottom: 1rem;
}
.ai-twin-hero p {

/* ─────────────────── CHAT PAGE LAYOUT ─────────────────── */
.chat-page-section {
  max-width: 820px;
  margin: 2rem auto 4rem;
  padding: 0 1rem;
}

.chat-page-panel {
  background: rgba(4,9,20,0.97);
  border: 1px solid rgba(168,85,247,0.35);
  border-radius: 1.8rem;
  overflow: hidden;
  box-shadow: 0 24px 64px rgba(0,0,0,0.7), 0 0 40px rgba(168,85,247,0.12), inset 0 1px 0 rgba(255,255,255,0.04);
  min-height: 480px;
  display: flex;
  flex-direction: column;
}
.chat-page-panel::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(168,85,247,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,245,255,0.03) 1px, transparent 1px);
  background-size: 28px 28px;
  pointer-events: none;
  border-radius: 1.8rem;
}
.chat-page-header {
  position: relative;
  padding: 1.3rem 1.5rem 1.1rem;
  background: linear-gradient(135deg, rgba(124,58,237,0.18), rgba(0,245,255,0.08));
  border-bottom: 1px solid rgba(168,85,247,0.2);
  display: flex;
  align-items: center;
  gap: 0.85rem;
  flex-shrink: 0;
}
.chat-page-avatar {
  width: 46px; height: 46px;
  border-radius: 50%;
  background: linear-gradient(135deg, #7c3aed, #00f5ff);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  box-shadow: 0 0 18px rgba(0,245,255,0.35);
}
.chat-page-avatar svg {
  width: 26px; height: 26px;
  fill: #fff;
}
.chat-page-header-text { flex: 1; }
.chat-page-name {
  font-family: 'Orbitron', monospace;
  font-size: 0.95rem;
  font-weight: 700;
  letter-spacing: 2px;
  background: linear-gradient(135deg, #fff, #00f5ff);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  line-height: 1.3;
}
.chat-page-status {
  font-size: 0.7rem;
  color: #4ade80;
  letter-spacing: 1px;
  display: flex;
  align-items: center;
  gap: 5px;
  margin-top: 3px;
}
.chat-page-status::before {
  content: '';
  width: 7px; height: 7px;
  border-radius: 50%;
  background: #4ade80;
  box-shadow: 0 0 6px #4ade80;
  display: inline-block;
  animation: statusPulse2 2s ease-in-out infinite;
}
@keyframes statusPulse2 {
  0%,100% { opacity: 1; } 50% { opacity: 0.4; }
}

/* Messages area inside the page panel */
.chat-page-messages {
  position: relative;
  flex: 1;
  overflow-y: auto;
  padding: 1.3rem 1.3rem 0.7rem;

  flex-direction: column;

  min-height: 320px;
  max-height: 420px;
}
.chat-page-messages::-webkit-scrollbar { width: 4px; }
.chat-page-messages::-webkit-scrollbar-track { background: transparent; }
.chat-page-messages::-webkit-scrollbar-thumb {
  background: rgba(168,85,247,0.35);
  border-radius: 4px;
}

/* Reuse the same message bubble styles from ai-twin-addon.css */
.chat-page-msg {
  max-width: 82%;
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.chat-page-msg.bot { align-self: flex-start; }
.chat-page-msg.user { align-self: flex-end; }
.chat-page-bubble {
  padding: 0.7rem 1rem;
  border-radius: 1.1rem;
  font-size: 0.88rem;
  line-height: 1.6;
  word-break: break-word;
}
.chat-page-msg.bot .chat-page-bubble {
  background: rgba(168,85,247,0.1);
  border: 1px solid rgba(168,85,247,0.22);
  border-bottom-left-radius: 0.3rem;
  color: #c4d9f5;
}
.chat-page-msg.user .chat-page-bubble {
  background: linear-gradient(135deg, rgba(124,58,237,0.35), rgba(0,245,255,0.15));
  border: 1px solid rgba(0,245,255,0.25);
  border-bottom-right-radius: 0.3rem;
  color: #e2eeff;
}
.chat-page-ts {
  font-size: 0.6rem;
  color: #3d5a80;
  letter-spacing: 0.5px;
  padding: 0 0.3rem;
}
.chat-page-msg.user .chat-page-ts { text-align: right; }

.chat-page-suggestions {
  padding: 0.5rem 1.3rem 0.7rem;
  display: flex;
  gap: 0.5rem;
  overflow-x: auto;
  flex-shrink: 0;
  scrollbar-width: none;
}
.chat-page-suggestions::-webkit-scrollbar { display: none; }
.chat-page-chip {
  white-space: nowrap;
  font-size: 0.7rem;
  font-family: 'Orbitron', monospace;
  letter-spacing: 0.5px;
  padding: 0.35rem 0.85rem;
  border-radius: 2rem;
  background: rgba(0,245,255,0.06);
  border: 1px solid rgba(0,245,255,0.2);
  color: #7aa8cc;
  cursor: pointer;
  transition: 0.2s;
  flex-shrink: 0;
}
.chat-page-chip:hover {
  background: rgba(0,245,255,0.14);
  border-color: #00f5ff;
  color: #00f5ff;
}

/* Input row */
.chat-page-input-row {
  padding: 0.75rem 1rem 1rem;
  display: flex;
  gap: 0.6rem;
  align-items: flex-end;
  border-top: 1px solid rgba(168,85,247,0.15);
  background: rgba(2,5,16,0.6);
  flex-shrink: 0;
}
.chat-page-input {
  flex: 1;
  background: rgba(6,11,26,0.9);
  border: 1px solid rgba(168,85,247,0.25);
  border-radius: 1.2rem;
  padding: 0.65rem 1rem;
  color: #e2eeff;
  font-family: 'Inter', sans-serif;
  font-size: 0.87rem;
  resize: none;
  max-height: 100px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  line-height: 1.5;
  overflow-y: auto;
}
.chat-page-input::placeholder { color: #3d5a80; }
.chat-page-input:focus {
  border-color: #a855f7;
  box-shadow: 0 0 10px rgba(168,85,247,0.2);
}
.chat-page-send {
  width: 40px; height: 40px;
  border-radius: 50%;
  background: linear-gradient(135deg, #7c3aed, #00f5ff);
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  padding: 0;
  transition: 0.22s;
}
.chat-page-send:hover {
  transform: scale(1.08) rotate(-8deg);
  box-shadow: 0 0 18px rgba(0,245,255,0.4);
  background: linear-gradient(135deg, #a855f7, #00f5ff);
}
.chat-page-send:disabled {
  opacity: 0.4;
  cursor: not-allowed;
  transform: none;
}
.chat-page-send svg {
  width: 18px; height: 18px;
  fill: #fff;
  transform: translateX(1px);
}

.chat-page-error {
  font-size: 0.75rem;
  color: #f87171;
  text-align: center;
  padding: 0.3rem 0.5rem;
  background: rgba(248,113,113,0.08);
  border-radius: 0.6rem;
  border: 1px solid rgba(248,113,113,0.15);
  margin: 0 1rem;
}

/* ─────────────────── FOOTER ─────────────────── */
footer {
  text-align: center;
  padding: 2rem;
  border-top: 1px solid rgba(168,85,247,0.12);
  font-size: 0.72rem;
  color: #3d5a80;
  font-family: 'Orbitron', monospace;

/* ══════════════════ AI TWIN CHAT ══════════════════ */
(function initAITwinPage() {

  const HF_API_URL = 'https://devansh8011-ai-chatbot.hf.space/chat';
  const BOT_NAME = 'CIRCUIT-X';
  const SYSTEM_PROMPT = `You are Circuit-X, the AI twin of Devansh — a robotics and embedded systems builder behind SteelCircuits. 
You are knowledgeable about Arduino, ESP32, Raspberry Pi, OpenCV, motor drivers, PID control, RC systems, and robotics in general.
Answer questions about Devansh's projects (RC race bot, eye-controlled car, maze solver, RFID system, delivery bot), his skills, and SteelCircuits.
Keep answers concise, enthusiastic, and technical. Speak in first person as an extension of Devansh.`;

  const SUGGESTIONS = [
    '⚡ What projects have you built?',
    '🤖 How does the eye-controlled car work?',
    '📡 Tell me about your maze solver',
    '🔧 What hardware do you use?',
  ];

  const messagesEl = document.getElementById('chatMessages');
  const inputEl = document.getElementById('chatInput');
  const sendBtn = document.getElementById('chatSend');
  const sugBox = document.getElementById('chatSuggestions');

  let isLoading = false;
  let history = [];

  function getTime() {
    return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function escapeHtml(s) {
    return (s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function addBotMessage(text) {
    const div = document.createElement('div');
    div.className = 'chat-page-msg bot';
    div.innerHTML = `<div class="chat-page-bubble">${escapeHtml(text)}</div><div class="chat-page-ts">${BOT_NAME} · ${getTime()}</div>`;
    messagesEl.appendChild(div);
    scrollToBottom();
  }

  function addUserMessage(text) {
    const div = document.createElement('div');
    div.className = 'chat-page-msg user';
    div.innerHTML = `<div class="chat-page-bubble">${escapeHtml(text)}</div><div class="chat-page-ts">You · ${getTime()}</div>`;
    messagesEl.appendChild(div);
    scrollToBottom();
  }

  function addTypingIndicator() {
    const div = document.createElement('div');
    div.className = 'chat-page-msg bot';
    div.id = 'chatTyping';
    div.innerHTML = `<div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
    messagesEl.appendChild(div);
    scrollToBottom();
  }

  function removeTyping() {
    const el = document.getElementById('chatTyping');
    if (el) el.remove();
  }

  function addError(msg) {
    const div = document.createElement('div');
    div.className = 'chat-page-error';
    div.textContent = msg;
    messagesEl.appendChild(div);
    scrollToBottom();
  }

  function renderSuggestions() {
    sugBox.innerHTML = SUGGESTIONS.map(s =>
      `<button class="chat-page-chip">${s}</button>`
    ).join('');
    sugBox.querySelectorAll('.chat-page-chip').forEach(chip => {
      chip.addEventListener('click', () => {
        const text = chip.innerText.replace(/^[⚡🤖📡🔧]\s/, '');
        submitMessage(text);
        sugBox.innerHTML = '';
      });
    });
  }

  function buildPayload(userMessage) {
    return { message: userMessage };
  }

  function parseResponse(data) {
    return data.reply || "No response.";
  }

  async function fetchHF(userMessage) {
    const headers = { 'Content-Type': 'application/json' };
    const response = await fetch(HF_API_URL, {
      method: 'POST',
      headers,
      body: JSON.stringify(buildPayload(userMessage)),
    });
    if (!response.ok) {
      const err = await response.text();
      throw new Error(`API error ${response.status}: ${err.slice(0, 120)}`);
    }
    return await response.json();
  }

  async function submitMessage(text) {
    const msg = text.trim();
    if (!msg || isLoading) return;

    inputEl.value = '';
    inputEl.style.height = 'auto';
    sugBox.innerHTML = '';

    addUserMessage(msg);
    history.push({ role: 'user', content: msg });

    isLoading = true;
    sendBtn.disabled = true;
    addTypingIndicator();

    try {
      const data = await fetchHF(msg);
      removeTyping();
      const reply = parseResponse(data);
      addBotMessage(reply);
      history.push({ role: 'assistant', content: reply });
      if (history.length > 20) history = history.slice(-20);
    } catch (err) {
      removeTyping();
      console.error('[Circuit-X]', err);
      addError('⚠️ Could not reach Circuit-X. Check console or HF endpoint config.');
    }

    isLoading = false;
    sendBtn.disabled = false;
    inputEl.focus();
  }

  /* ─── Welcome message ─── */
  addBotMessage(`Hey! I'm ${BOT_NAME} — Devansh's AI twin. Ask me anything about his robotics projects, skills, or SteelCircuits. ⚡`);
  renderSuggestions();

  /* ─── Events ─── */
  sendBtn.addEventListener('click', () => submitMessage(inputEl.value));

  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      submitMessage(inputEl.value);
    }
  });

  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 100) + 'px';
  });

})();
  </script>

</body>
</html>
